<div class="page-header">
  <h2>Shop Wise Report</h2>
  <p class="page-subtitle">Commodity arrival details grouped by shop, with rates and value</p>
</div>
<div class="report-filter-bar card">
  <div class="report-filter-fields">
    <div class="form-group">
      <label for="rpt-sw-from">From Date</label>
      <input type="date" id="rpt-sw-from" />
    </div>
    <div class="form-group">
      <label for="rpt-sw-to">To Date</label>
      <input type="date" id="rpt-sw-to" />
    </div>
    <div class="form-group" style="max-width:160px">
      <label for="rpt-sw-shop">Shop No. (optional)</label>
      <input type="text" id="rpt-sw-shop" placeholder="e.g. B-2" autocomplete="off" style="text-transform:uppercase" />
    </div>
    <button class="btn btn-primary" id="rpt-sw-fetch">&#128269; Check</button>
  </div>
</div>
<div class="card" id="rpt-sw-result" style="display:none">
  <div class="card-header">
    <h3>Shop Wise Details</h3>
    <div class="card-header-actions">
      <span class="badge" id="rpt-sw-count">0 shops</span>
      <button class="btn btn-ghost btn-sm" id="rpt-sw-print">&#128424; Print</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table class="data-table" id="rpt-sw-table">
      <thead>
        <tr>
          <th style="width:140px">Date &amp; Time</th>
          <th style="width:130px">Gate Pass No.</th>
          <th>Commodity</th>
          <th style="text-align:center;width:70px">Qty</th>
          <th style="text-align:center;width:70px">Unit</th>
        </tr>
      </thead>
      <tbody id="rpt-sw-tbody"></tbody>
    </table>
  </div>
</div>

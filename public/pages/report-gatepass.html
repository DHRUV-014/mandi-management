<div class="page-header">
  <h2>Gate Pass Wise Report</h2>
  <p class="page-subtitle">View all gate passes for a specific date range</p>
</div>
<div class="report-filter-bar card">
  <div class="report-filter-fields">
    <div class="form-group">
      <label for="rpt-gp-from">From Date</label>
      <input type="date" id="rpt-gp-from" />
    </div>
    <div class="form-group">
      <label for="rpt-gp-to">To Date</label>
      <input type="date" id="rpt-gp-to" />
    </div>
    <button class="btn btn-primary" id="rpt-gp-fetch">&#128269; Fetch Report</button>
  </div>
</div>
<div class="card" id="rpt-gp-result" style="display:none">
  <div class="card-header">
    <h3>Gate Passes</h3>
    <div class="card-header-actions">
      <span class="badge" id="rpt-gp-count">0 records</span>
      <button class="btn btn-ghost btn-sm" id="rpt-gp-print">&#128424; Print</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table class="data-table" id="rpt-gp-table">
      <thead>
        <tr>
          <th style="width:140px">Date &amp; Time</th>
          <th style="width:110px">Gate Pass No.</th>
          <th>Commodity</th>
          <th style="text-align:center;width:70px">Qty</th>
          <th style="text-align:center;width:70px">Unit</th>
          <th style="width:130px">Vehicle No.</th>
        </tr>
      </thead>
      <tbody id="rpt-gp-tbody"></tbody>
    </table>
  </div>
</div>

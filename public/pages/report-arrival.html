<div class="page-header">
  <h2>Commodity State Wise Report</h2>
  <p class="page-subtitle">Commodity-wise arrival grouped by state</p>
</div>
<div class="report-filter-bar card">
  <div class="report-filter-fields">
    <div class="form-group">
      <label for="rpt-ar-from">From Date</label>
      <input type="date" id="rpt-ar-from" />
    </div>
    <div class="form-group">
      <label for="rpt-ar-to">To Date</label>
      <input type="date" id="rpt-ar-to" />
    </div>
    <button class="btn btn-primary" id="rpt-ar-fetch">&#128269; Fetch Report</button>
  </div>
</div>
<div class="card" id="rpt-ar-result" style="display:none">
  <div class="card-header">
    <h3>Commodity State Wise</h3>
    <div class="card-header-actions">
      <span class="badge" id="rpt-ar-count">0 commodities</span>
      <button class="btn btn-ghost btn-sm" id="rpt-ar-print">&#128424; Print</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table class="data-table csw-table" id="rpt-ar-table">
      <thead>
        <tr>
          <th style="width:220px">Commodity / State</th>
          <th style="text-align:right;width:130px">Qty</th>
          <th style="width:80px">Unit</th>
        </tr>
      </thead>
      <tbody id="rpt-ar-tbody"></tbody>
    </table>
  </div>
</div>

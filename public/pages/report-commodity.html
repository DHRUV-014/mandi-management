<div class="page-header">
  <h2>Commodity Wise Report</h2>
  <p class="page-subtitle">Summary of arrivals grouped by commodity</p>
</div>
<div class="report-filter-bar card">
  <div class="report-filter-fields">
    <div class="form-group">
      <label for="rpt-cm-from">From Date</label>
      <input type="date" id="rpt-cm-from" />
    </div>
    <div class="form-group">
      <label for="rpt-cm-to">To Date</label>
      <input type="date" id="rpt-cm-to" />
    </div>
    <button class="btn btn-primary" id="rpt-cm-fetch">&#128269; Fetch Report</button>
  </div>
</div>
<div id="rpt-cm-summary" class="report-summary hidden"></div>
<div class="card" id="rpt-cm-result" style="display:none">
  <div class="card-header">
    <h3>Commodity Summary</h3>
    <div class="card-header-actions">
      <span class="badge" id="rpt-cm-count">0 records</span>
      <button class="btn btn-ghost btn-sm" id="rpt-cm-print">&#128424; Print</button>
    </div>
  </div>
  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Commodity</th>
          <th>Short Name</th>
          <th style="text-align:center">Measure</th>
          <th style="text-align:center">Gate Passes</th>
          <th style="text-align:center">Traders</th>
          <th style="text-align:center">Total Qty</th>
          <th style="text-align:center">Total Weight</th>
        </tr>
      </thead>
      <tbody id="rpt-cm-tbody"></tbody>
    </table>
  </div>
</div>
